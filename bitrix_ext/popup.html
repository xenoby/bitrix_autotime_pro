<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 320px; padding: 15px; font-family: system-ui, sans-serif; font-size: 13px; }
    label { display: block; margin: 10px 0 4px; font-weight: 500; }
    input[type="time"], input[type="url"] { width: 100%; padding: 6px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    .time-row { display: flex; gap: 8px; }
    .time-row label { flex: 1; margin: 0; }
    .days { display: flex; gap: 4px; margin: 10px 0; }
    .day-btn { flex: 1; padding: 6px 0; text-align: center; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .day-btn.active { background: #2fc6f7; color: #fff; border-color: #2fc6f7; }
    .checkbox-label { display: flex; align-items: center; gap: 8px; margin: 10px 0; cursor: pointer; }
    .checkbox-label input { width: auto; }
    button#save { width: 100%; padding: 10px; background: #2fc6f7; color: #fff; border: none; border-radius: 4px; cursor: pointer; margin-top: 15px; font-weight: 500; }
    #lastLog { margin-top: 10px; font-size: 11px; color: #666; min-height: 15px; }
    .hint { font-size: 10px; color: #888; margin-top: 4px; }
  </style>
</head>
<body>
  <label>🔗 Webhook URL:
    <input type="url" id="webhookUrl" placeholder="https://portal.bitrix24.ru/rest/1/TOKEN/">
  </label>
  <div class="hint">Разработчикам → Вебхуки → Входящий вебхук</div>
  <div class="hint">Права: user, timeman, im, notifications</div>
  
  <label>⏰ Начало дня:
    <input type="time" id="startTime">
  </label>
  
  <label>🍕 Перерыв:</label>
  <div class="time-row">
    <label>Уход<input type="time" id="lunchStart"></label>
    <label>Возврат<input type="time" id="lunchEnd"></label>
  </div>
  
  <label>✅ Конец дня:
    <input type="time" id="stopTime">
  </label>
  
  <label class="checkbox-label">
    <input type="checkbox" id="muteDuringLunch">
    <span>🔕 Не беспокоить во время перерыва</span>
  </label>
  
  <label>📅 Рабочие дни:</label>
  <div class="days">
    <div class="day-btn" data-day="1">Пн</div>
    <div class="day-btn" data-day="2">Вт</div>
    <div class="day-btn" data-day="3">Ср</div>
    <div class="day-btn" data-day="4">Чт</div>
    <div class="day-btn" data-day="5">Пт</div>
    <div class="day-btn" data-day="6">Сб</div>
    <div class="day-btn" data-day="0">Вс</div>
  </div>
  
  <button id="save">Сохранить всё</button>
  <div id="lastLog"></div>
  <script src="popup.js"></script>
</body>
</html>
